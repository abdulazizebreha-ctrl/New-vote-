<!DOCTYPE html>
<html lang="am">
<head>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f8f9fa; text-align: center; }
        .hero { background: #343a40; color: white; padding: 20px; }
        .card-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 200px; }
        img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
        input { margin: 5px 0; padding: 8px; width: 80%; }
        button { background: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="hero"><h1>የአሸናፊው ሽልማት 100 ሺህ ብር!</h1></div>
    <div class="card-container" id="app"></div>
    <script>
        fetch('/api/data').then(r => r.json()).then(data => {
            const app = document.getElementById('app');
            data.candidates.forEach(c => {
                app.innerHTML += `
                <div class="card">
                    <img src="${c.photo}">
                    <h2>${c.name}</h2>
                    <p>ድምፅ: ${c.votes}</p>
                    <form action="/vote" method="POST">
                        <input type="hidden" name="name" value="${c.name}">
                        <input type="text" name="voterName" placeholder="ስምዎ" required>
                        <input type="tel" name="voterPhone" placeholder="ስልክ ቁጥር" required>
                        <button type="submit">ድምፅ ስጥ</button>
                    </form>
                </div>`;
            });
        });
    </script>
</body>
</html>
